services:
  # ── PostgreSQL Database ──
  db:
    image: postgres:16-alpine
    container_name: mathplus-db
    restart: always
    environment:
      POSTGRES_USER: mathplus
      POSTGRES_PASSWORD: ${DB_PASSWORD:-MathPlus@2026!Secure}
      POSTGRES_DB: mathplus
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mathplus -d mathplus"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Next.js Web App ──
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mathplus-web
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://mathplus:${DB_PASSWORD:-MathPlus@2026!Secure}@db:5432/mathplus?schema=public
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
    driver: local
